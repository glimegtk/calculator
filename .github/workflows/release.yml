name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ghc cabal-install gtk4 gobject-introspection
          cabal update
      
      - name: Build
        run: cabal build hello-gtk

      - name: Create app bundle
        run: ./scripts/create-bundle.sh

      - name: Create ZIP
        run: zip -r Calculator.zip Calculator.app

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" Calculator.zip --title "Calculator ${{ github.ref_name }}" --notes "Download the macOS app bundle"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
