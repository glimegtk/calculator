name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Haskell
        uses: haskell/actions@v2
        with:
          ghc-version: '9.14.1'
          cabal-version: '3.16.1.0'
      
      - name: Install dependencies
        run: |
          brew install gtk4 gobject-introspection
      
      - name: Build
        run: cabal build hello-gtk
      
      - name: Create app bundle
        run: |
          mkdir -p Calculator.app/Contents/MacOS
          mkdir -p Calculator.app/Contents/Resources
          
          cp dist-newstyle/build/*/ghc-*/hello-gtk-*/x/hello-gtk/build/hello-gtk/hello-gtk Calculator.app/Contents/MacOS/Calculator
          cp GUI/hello-gtk.png Calculator.app/Contents/Resources/icon.png
          
          cat > Calculator.app/Contents/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>Calculator</string>
    <key>CFBundleIdentifier</key>
    <string>com.example.Calculator</string>
    <key>CFBundleName</key>
    <string>Calculator</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>0.1.1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSMinimumSystemVersion</key>
    <string>10.15</string>
    <key>NSHighResolutionCapable</key>
    <true/>
</dict>
</plist>
EOF
      
      - name: Create ZIP
        run: zip -r Calculator.zip Calculator.app
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: Calculator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}